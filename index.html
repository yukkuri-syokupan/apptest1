<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <title>PWAテスト</title>
</head>
<body>
  <h1>PWAインストールテスト</h1>
  
  <!-- 最初は非表示にしておく -->
  <button id="installBtn" style="display: none; padding: 10px 20px;">
    アプリをインストールする
  </button>

  <script>
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    // ブラウザがインストール可能だと判断した時に発火
    window.addEventListener('beforeinstallprompt', (e) => {
      // ブラウザ標準のバナーが出るのを防ぐ
      e.preventDefault();
      // イベントを保存しておく
      deferredPrompt = e;
      // 自作のインストールボタンを表示
      installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        // 保存しておいたダイアログを表示
        deferredPrompt.prompt();
        // ユーザーの選択を待つ
        const { outcome } = await deferredPrompt.userChoice;
        console.log(`ユーザの選択: ${outcome}`);
        // 一度使ったら無効化
        deferredPrompt = null;
        installBtn.style.display = 'none';
      }
    });

    // サービスワーカーの登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
